        <script src="../../../common/jquery-1.11.3.min.js" type="text/javascript"></script>

        <style>
            body { 
                padding: 1.5em 0;
                background-color: #ffffff; 
            }

            p {
                /* margin-bottom: 0; */
                margin-left: 0px !important;
            }
		</style>
    </head>
    <body>
        <div class="container">
            <div id="poem"></div>
        </div>
        
        <script>
            $(document).ready(function () {
                $.ajax("/poemBennett")
                .done(function(data) {
                    console.log(data);

                    html = "";
                    verses = JSON.parse(data);
                    // formatVerses(verses);

                    if (verses.length > 0) {
                        for (i = 0; i < verses.length; i++) {
                            html += verses[i];
                        }
                    }
                    $("#poem").html(html);
                })
                .fail(function() {
                    alert("Error connecting to eldiletantedigital.com.\nCheck your network and refresh, please.");
                })
            });

        </script>
    </body>
</html>
