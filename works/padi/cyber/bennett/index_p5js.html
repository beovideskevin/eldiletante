        <link rel="shortcut icon" href="../../../../style/images/favicon.ico" type="image/x-icon">

        <script src="../../../common/jquery-1.11.3.min.js" type="text/javascript"></script>
        <script src="../../../common/p5/p5.js"></script>

        <style>
            body { 
                padding: 10px;
                background-color: #ffffff; 
            }
		</style>
    </head>
    <body>
        <script>
            var versesWithFormat = [];                
            var fontArr = ["serif",	"sans-serif", "monospace"];
            var sizeArr = ["12", "16", "20", "24", "28"];
            var weightArr = ["normal", "bold", "normal", "italic", "normal"];
            var alignArr = ["left", "right", "center"];
            var gridArr = ["1", "2", "3", "4"];

            function setup() {
                var cnv = createCanvas(window.innerWidth - 40, window.innerHeight - 40);
            }

            function draw() {
                background(220);
                if (versesWithFormat.length > 0) {
                    textFont(versesWithFormat[0].style.font);
                    textSize(versesWithFormat[0].style.size);
                    text(versesWithFormat[0].text, 12, 60);
                }
                
            }

            $(document).ready(function () {
                $.ajax("/poemBennett")
                .done(function(data) {
                    console.log(data);

                    html = "";
                    verses = JSON.parse(data);
                    formatVerses(verses);
                })
                .fail(function() {
                    alert("Error connecting to eldiletantedigital.com.\nCheck your network and refresh, please.");
                })
            });

            function formatVerses(verses) {
                for (var i = 0; i < verses.length; i++) {
                    newNode = {text: "", style: {}};
                    newNode.text = verses[i];
                    newNode.style.font = fontArr[Math.round((fontArr.length - 1) * Math.random())];
                    newNode.style.size = sizeArr[Math.round((sizeArr.length - 1) * Math.random())];
                    newNode.style.weight = weightArr[Math.round((weightArr.length - 1) * Math.random())];
                    newNode.style.align = alignArr[Math.round((alignArr.length - 1) * Math.random())];
                    newNode.style.grid = gridArr[Math.round((gridArr.length - 1) * Math.random())];
                    versesWithFormat.push(newNode);
                }
                console.log(versesWithFormat);
            }

        </script>
    </body>
</html>
