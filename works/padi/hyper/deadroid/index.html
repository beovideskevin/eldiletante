	<script>
		var index = 0;
		var frames = 0;
		var i;
		var first_time = true;
		
		i = setInterval(function () {
			if (frames > 0) {
				frames--;
			}
			else {
				
				if (first_time == true) {
					$(window).scrollTop(0);
					$("#deadroid_container").html("");
					first_time = false;
				}
				
				if (index < lines.length) {
					if (lines[index].charAt(0) == '-') {
						frames = parseInt(lines[index].substring(1), 10);
					}
					else if (lines[index].charAt(0) == '+') {
						$("#deadroid_container").append(lines[index].substring(1));
					}
					else {
						$("#deadroid_container").append("<br>" + lines[index]);
					}
					$(window).scrollTop($(document).height());
					index++;
				}
				else {
					index = 0;
					buffer = "";
					frames = 240;
					first_time = true;
				}
			}
		}, 50);
	
	</script>
