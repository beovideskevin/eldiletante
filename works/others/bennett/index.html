    <body>
        <div id="poem">

        <script>
            $(document).ready(function () {
                $.ajax("/390e53ab5ee8a5e7032be0121864ca121cfa3ff1/poem")
                .done(function(data) {
                    console.log(data);

                    html = "";
                    verses = JSON.parse(data);
                    for (i=0; i < verses.length; i++) {
                        html += verses[i]; 
                    }
                    $("#poem").html(html);
                })
                .fail(function() {
                    alert( "error" );
                })
            });
        </script>
