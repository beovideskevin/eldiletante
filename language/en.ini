ABOUT_LABEL=>About me:
ABOUT_SUBLABEL=><p>Bachelor of Arts in Philosophy, University of Havana (2004). Masters in Art History, University of Havana (2011). Associate in Science: AS Computer Programming and Analysis - Business Applications Programming, Miami Dade College (2019).</p><p>I have worked as a professor at the University of Arts of Cuba (ISA), the University of Havana and Miami Dade College. I have participated as a speaker in several events like “Beyond the Hyphen. Approaching a Post Geographic Cuba” (Princeton University, 2014) and the Permanent Seminar of the IGCAAV (Universidad de Guadalajara, 2017).</p><p>I have venture in the visual arts and literature from an interdisciplinary perspective. My artistic interests are linked to the new technologies, and especially focused on “dis-occulting” their communicational logic. My works have been included in art shows like “Ojalá!” (Zeitgenössische kubanische Kunst, Berlin, 2015) and “Hope” (ESMoA, Los Angeles, 2017).</p><p>You can find my resume on <a href="https://www.linkedin.com/in/beovideskevin" target="_blank">linkedin</a> and samples of my code on <a href="https://github.com/beovideskevin" target="_blank">github</a>.</p>

