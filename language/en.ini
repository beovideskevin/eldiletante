ABOUT_LABEL=>About me:
ABOUT_SUBLABEL=><p>Bachelor of Arts in Philosophy, University of Havana (2004). Masters in Art History, University of Havana (2011). College Credit Certificate in the field of Computer Programmer - Business Applications, Miami Dade College (2018). I hold several certifications like Comptia A+, Comptia Network+, Comptia IT Operations Specialist and CCNA.</p><p>I have worked as a professor in several universities as the University of Arts of Cuba (ISA) and the Miami Dade College; teaching classes that range from Philosophy, Aesthetics and Arts, to the Internet of Things.</p><p>I have venture in the visual arts and literature from an interdisciplinary perspective. My artistic interests are linked to the new technologies, especially those related to Internet. You can find my resume in <a href="https://www.linkedin.com/in/beovideskevin" target="_blank">linkedin</a> and samples of my code in <a href="https://github.com/beovideskevin" target="_blank">github</a>.</p>

