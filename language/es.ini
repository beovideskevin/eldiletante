ABOUT_LABEL=>Acerca de mí:
ABOUT_SUBLABEL=><p>Graduado de Filosofía (2004) y Master en Historia del Arte (2011) en la Universidad de la Habana. Graduado del Miami Dade College con un College Credit Certificate titulado "Computer Programmer - Business Applications" (2018). Tengo varias certificaciones entre las que se cuentan Comptia A+, Comptia Network+, Comptia IT Operations Specialist y CCNA.</p><p>He sido profesor en varias universidades como La Universidad de las Artes de Cuba (ISA) y el Miami Dade College; impartiendo cursos que van desde Filosofía, Estética y Arte, hasta Internet of Things.</p><p>He incursionado, desde una perspectiva interdisciplinar, en las artes visuales y la literatura. Mis intereses estéticos se nutren de las nuevas tecnologías, especialmente de aquellas vinculadas a la Internet. En los siguientes vínculos encontrará mi <a href="/blog/dossier/">Dossier</a> y <a href="blog/curriculum-vitae/">Curriculum</a>.</p>

