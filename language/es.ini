ABOUT_LABEL=>Acerca de mí:
ABOUT_SUBLABEL=><p>Licenciado de Filosofía, en la Universidad de la Habana (2004). Máster en Historia del Arte, en la Universidad de la Habana (2011). Asociado en Ciencia: Programación de computadoras y análisis - Programación de Aplicaciones de Negocios, Miami Dade College (2019).</p><p>Profesor de la Universidad de las Artes de Cuba, la Universidad de la Habana y el Miami Dade College. Ha participado como ponente en múltiples eventos, entre los que se encuentran “Beyond the Hyphen. Approaching a Post Geographic Cuba” (Princeton University, 2014) y en el Seminario Permanente del IGCAAV (Universidad de Guadalajara, 2017).</p><p>Ha incursionado, desde una perspectiva interdisciplinar, en las artes visuales y la literatura. Sus intereses estéticos se nutren de las nuevas tecnologías, especialmente para des-ocultar sus lógicas comunicativas. Su obra artística ha sido incluida en múltiples exposiciones como las siguientes, “Ojalá!” (Zeitgenössische kubanische Kunst, Berlin, 2015) y “Hope” (ESMoA, Los Angeles, 2017).</p><p>Puede encontrar más detalles en <a href="https://www.linkedin.com/in/beovideskevin" target="_blank">linkedin</a> y ejemplos de mi código en <a href="https://github.com/beovideskevin" target="_blank">github</a>.</p>

